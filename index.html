<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1115" />
  <title>Chore Logger v3</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Personal chore action logger</p>
        <h1>Chore Logger <span class="version-badge">v3</span></h1>
      </div>
      <div class="header-actions">
        <button id="openManualBtn" class="primary-btn">Manual Entry</button>
        <button id="collapseAllBtn" class="ghost-btn">Collapse All</button>
        <button id="expandAllBtn" class="ghost-btn">Expand All</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-view="homeView">Home</button>
      <button class="tab" data-view="logView">Log</button>
      <button class="tab" data-view="manageView">Manage</button>
      <button class="tab" data-view="settingsView">Settings</button>
    </nav>

    <main>
      <section id="homeView" class="view active">
        <div class="card stats-grid">
          <div>
            <p class="muted">Today</p>
            <strong id="todayCount">0</strong>
          </div>
          <div>
            <p class="muted">This week</p>
            <strong id="weekCount">0</strong>
          </div>
          <div>
            <p class="muted">Daily streak</p>
            <strong id="streakCount">0</strong>
          </div>
        </div>
        <div id="groupsContainer" class="stack"></div>
      </section>

      <section id="logView" class="view">
        <div class="card stack gap-sm">
          <div class="toolbar two-col">
            <input id="searchLog" type="search" placeholder="Search logs..." />
            <select id="filterGroup">
              <option value="all">All groups</option>
            </select>
          </div>
          <div class="toolbar two-col">
            <input id="filterFrom" type="date" />
            <input id="filterTo" type="date" />
          </div>
        </div>
        <div id="logContainer" class="stack"></div>
      </section>

      <section id="manageView" class="view">
        <div class="card stack gap-md">
          <h2>Add Group</h2>
          <div class="toolbar two-col">
            <input id="newGroupName" type="text" placeholder="Kitchen" />
            <button id="addGroupBtn" class="primary-btn">Add Group</button>
          </div>
        </div>
        <div id="manageGroupsContainer" class="stack"></div>
      </section>


      <section id="groupView" class="view">
        <div class="card stack gap-md">
          <div class="group-detail-head">
            <button id="backToHomeBtn" class="ghost-btn">← Back</button>
            <div class="grow">
              <h2 id="groupDetailTitle">Group</h2>
              <p id="groupDetailMeta" class="muted small"></p>
            </div>
            <span id="groupDetailToday" class="group-pill">0 today</span>
          </div>
          <div id="groupDetailList" class="stack"></div>
        </div>
      </section>

      <section id="settingsView" class="view">
        <div class="card stack gap-md">
          <h2>Settings</h2>
          <label class="checkbox-row">
            <input id="collapseByDefault" type="checkbox" />
            Collapse groups by default
          </label>
          <div class="toolbar two-col">
            <button id="restoreDefaultsBtn" class="ghost-btn">Restore Starter Template</button>
            <button id="resetDataBtn" class="danger-btn">Wipe All Data</button>
          </div>
          <div class="toolbar two-col">
            <button id="exportDataBtn" class="primary-btn">Export Backup</button>
            <label class="ghost-btn file-label" for="importDataInput">Import Backup</label>
            <input id="importDataInput" type="file" accept="application/json" class="hidden" />
          </div>
          <p class="muted small">Starter template only seeds when storage is empty, so code updates stop wiping your setup. Export backups before any big changes.</p>
        </div>
      </section>
    </main>
  </div>

  <dialog id="manualDialog" class="modal">
    <form id="manualForm" method="dialog" class="stack gap-md">
      <div class="modal-head">
        <h2 id="manualTitle">Manual Entry</h2>
        <button type="button" class="icon-btn" data-close-modal>&times;</button>
      </div>
      <div class="toolbar two-col">
        <select id="manualGroup"></select>
        <select id="manualSubChore"></select>
      </div>
      <div class="toolbar two-col">
        <select id="manualAction">
          <option value="plus">+ Done</option>
          <option value="minus">- Correction</option>
        </select>
        <input id="manualAmount" type="number" min="1" value="1" />
      </div>
      <div class="toolbar two-col">
        <input id="manualDate" type="date" required />
        <input id="manualTime" type="time" required />
      </div>
      <textarea id="manualNote" rows="3" placeholder="Optional note"></textarea>
      <input id="editingLogId" type="hidden" />
      <div class="toolbar two-col">
        <button type="button" class="ghost-btn" data-close-modal>Cancel</button>
        <button type="submit" class="primary-btn">Save Entry</button>
      </div>
    </form>
  </dialog>

  <template id="groupCardTemplate">
    <article class="card group-card group-link-card">
      <button class="group-link-btn" type="button">
        <div class="group-head">
          <div class="group-heading-copy">
            <h2 class="group-name"></h2>
            <div class="group-heading-meta">
              <p class="muted small group-meta"></p>
              <span class="group-pill group-today">0 today</span>
            </div>
          </div>
          <span class="icon-btn group-open-arrow" aria-hidden="true">›</span>
        </div>
      </button>
    </article>
  </template>

  <template id="manageGroupTemplate">
    <article class="card stack gap-md">
      <div class="group-head">
        <div class="grow">
          <input class="group-name-input" type="text" />
        </div>
        <button class="danger-btn delete-group-btn">Delete Group</button>
      </div>
      <div class="manage-sub-list stack gap-sm"></div>
      <div class="toolbar two-col">
        <input class="new-sub-input" type="text" placeholder="Add sub-chore" />
        <button class="primary-btn add-sub-btn">Add Sub-Chore</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
