
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chore Logger v6</title>
<link rel="stylesheet" href="styles.css?v=6">
</head>
<body>

<div class="app">

<header class="header">
<h1>Chore Logger <span class="pill">v6</span></h1>
<p class="sub">Swipe → log actions</p>
</header>

<nav class="tabs">
<button data-tab="home" class="tab active">Home</button>
<button data-tab="group" class="tab">Group</button>
<button data-tab="log" class="tab">Log</button>
</nav>

<section id="home" class="panel active">
<div id="groupList"></div>
</section>

<section id="group" class="panel">
<button id="backBtn">← Back</button>
<h2 id="groupTitle"></h2>
<div id="choreList"></div>
</section>

<section id="log" class="panel">
<h2>Log</h2>
<div id="logList"></div>
</section>

<div id="toast"></div>

</div>

<script src="app.js?v=6"></script>
</body>
</html>
